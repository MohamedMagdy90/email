[build]
  command = "bun run build"
  publish = "dist"

# Proxy API calls to the Railway backend.
# Same-origin for the browser (no CORS), and no VITE_API_URL needed.
[[redirects]]
  from = "/api/*"
  to = "https://email-production-3c14.up.railway.app/api/:splat"
  status = 200
  force = true

# SPA fallback (keep this LAST)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
